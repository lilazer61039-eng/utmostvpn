<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UtmostVPN Setup</title>
    <style>
        :root { --bg-color: #050505; --neon-cyan: #00e5ff; --text-muted: #888888; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: white; padding: 20px; }
        
        .header { margin: 20px 0 30px; }
        .header h1 { font-size: 28px; color: var(--neon-cyan); font-weight: 800; text-transform: uppercase; }
        
        .section-title { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
        .section-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.4; }
        
        .copy-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; background: #161616; border: 1px solid #333; padding: 16px;
            border-radius: 14px; color: white; font-size: 16px; cursor: pointer; margin-bottom: 32px;
        }

        .app-card {
            display: flex; align-items: center; justify-content: space-between;
            background: #111; border: 1px solid #222; padding: 16px;
            border-radius: 18px; margin-bottom: 12px;
        }
        
        .app-info { display: flex; align-items: center; gap: 12px; }
        .app-icon { width: 44px; height: 44px; border-radius: 10px; background: #222; display:flex; align-items:center; justify-content:center; border: 1px solid #333; }
        .app-name { font-size: 16px; font-weight: bold; }
        .app-hint { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        .app-actions { display: flex; gap: 8px; }
        
        /* Та самая кнопка плюсика */
        .btn-plus {
            display: flex; align-items: center; justify-content: center;
            width: 44px; height: 44px; border-radius: 12px;
            background: rgba(0, 229, 255, 0.15); color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan); text-decoration: none;
            font-size: 22px; font-weight: bold;
        }

        .btn-dl {
            display: flex; align-items: center; justify-content: center;
            width: 44px; height: 44px; border-radius: 12px;
            background: #1a1a1a; border: 1px solid #333; color: white; text-decoration: none;
        }

        #toast {
            position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%);
            background: var(--neon-cyan); color: black; padding: 12px 24px;
            border-radius: 30px; font-weight: bold; transition: 0.4s;
        }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <div class="header"><h1>UTMOST VPN</h1></div>

    <h2 class="section-title">Выберите приложение</h2>
    <p class="section-desc">Для подключения к VPN понадобится одно из приложений, поддерживающих протокол VLESS.</p>

    <button class="copy-btn" onclick="copyKey()">Скопировать ключ</button>

    <h2 class="section-title">Рекомендуем:</h2>

    <div class="app-card">
        <div class="app-info">
            <div class="app-icon">V2</div>
            <div><div class="app-name">v2RayTun</div><div class="app-hint">Авто-настройка</div></div>
        </div>
        <div class="app-actions">
            <a id="link-v2ray" href="#" class="btn-plus">+</a>
            <a href="https://apps.apple.com/us/app/v2raytun/id6476628951" class="btn-dl">↓</a>
        </div>
    </div>

    <div class="app-card">
        <div class="app-info">
            <div class="app-icon">VB</div>
            <div><div class="app-name">V2Box</div><div class="app-hint">Для iOS и Android</div></div>
        </div>
        <div class="app-actions">
            <a id="link-v2box" href="#" class="btn-plus">+</a>
            <a href="https://apps.apple.com/us/app/v2box-v2ray-client/id6446814690" class="btn-dl">↓</a>
        </div>
    </div>

    <div class="app-card">
        <div class="app-info">
            <div class="app-icon">S</div>
            <div><div class="app-name">Streisand</div><div class="app-hint">Максимальная скорость</div></div>
        </div>
        <div class="app-actions">
            <a id="link-streisand" href="#" class="btn-plus">+</a>
            <a href="https://apps.apple.com/us/app/streisand/id6443534192" class="btn-dl">↓</a>
        </div>
    </div>

    <div id="toast">Ключ скопирован!</div>

    <script>
        // 1. Получаем ключ из URL
        const params = new URLSearchParams(window.location.search);
        let key = params.get('key') || "";
        key = key.trim();

        // 2. Формируем спец-ссылки для каждого приложения
        if (key && (key.startsWith("vless") || key.startsWith("vmess"))) {
            
            // Для V2rayTun используем их прямой импорт
            document.getElementById('btn-v2raytun').href = "v2raytun://import/" + key;
            
            // Для HAPP (они обычно едят vless напрямую, но добавим импорт на всякий случай)
            document.getElementById('btn-happ').href = "happ://import/" + key;
            
            // Для V2Box используем их стандартный протокол подписки
            document.getElementById('btn-v2box').href = "v2box://install-sub?url=" + encodeURIComponent(key);
            
        } else {
            // Если ключа нет, вешаем предупреждение
            const addButtons = document.querySelectorAll('.action-add');
            addButtons.forEach(btn => {
                btn.onclick = (e) => {
                    e.preventDefault();
                    alert("Ошибка: Ключ не найден. Запросите его в боте заново.");
                };
            });
        }

        // Функция копирования (оставляем как есть)
        function copyKey() {
            if (!key) return;
            const tempInput = document.createElement("input");
            tempInput.value = key;
            document.body.appendChild(tempInput);
            tempInput.select();
            tempInput.setSelectionRange(0, 99999);
            document.execCommand("copy");
            document.body.removeChild(tempInput);

            const toast = document.getElementById('toast');
            toast.innerText = "Ключ скопирован!";
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
